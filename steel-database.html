<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel Database — BAMA Fabrication</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="bama.css?v=20260505k">
<style>
  .app-header {
    background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 18px;
    text-decoration: none;
  }

  .back-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .brand-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), #cc5500);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 0 20px rgba(255,107,0,0.15);
  }

  .brand h1 {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 2px;
    color: #fff;
  }

  .brand h1 span { color: var(--accent); }

  .brand p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .search-box {
    position: relative;
    width: 320px;
  }

  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 38px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,107,0,0.15);
  }

  .search-box input::placeholder { color: var(--subtle); }

  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--subtle);
    font-size: 14px;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .stat-value {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--accent);
    font-size: 13px;
  }

  .tab-bar {
    display: flex;
    gap: 4px;
    padding: 12px 32px 0;
    background: var(--bg);
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    padding: 10px 18px;
    border-radius: 8px 8px 0 0;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: var(--font-body);
  }

  .tab:hover {
    color: var(--text);
    background: var(--card);
  }

  .tab.active {
    background: var(--card);
    color: var(--accent);
    border-color: var(--border);
    font-weight: 600;
  }

  .tab .tab-count {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--border);
    color: var(--muted);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }

  .tab.active .tab-count {
    background: rgba(255,107,0,0.15);
    color: var(--accent);
  }

  .main-content {
    padding: 0 32px 32px;
  }

  .table-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    flex-wrap: wrap;
    gap: 8px;
  }

  .table-info-left {
    font-size: 13px;
    color: var(--muted);
  }

  .table-info-left strong {
    color: var(--text);
    font-weight: 600;
  }

  .table-wrapper {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    scrollbar-width: thin;
    scrollbar-color: var(--subtle) transparent;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  thead tr:first-child th {
    background: linear-gradient(180deg, var(--border) 0%, var(--card) 100%);
    color: #fff;
    font-weight: 600;
    padding: 12px 14px;
    text-align: center;
    white-space: nowrap;
    border-bottom: 1px solid var(--subtle);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    font-size: 12px;
    letter-spacing: 0.3px;
  }

  thead tr:first-child th:hover {
    background: var(--subtle);
  }

  thead tr:first-child th:first-child {
    text-align: left;
    padding-left: 18px;
    position: sticky;
    left: 0;
    z-index: 11;
  }

  thead tr:nth-child(2) th {
    background: var(--card);
    color: var(--muted);
    font-weight: 400;
    font-size: 11px;
    padding: 6px 14px;
    text-align: center;
    border-bottom: 2px solid #cc5500;
    font-family: var(--font-mono);
  }

  thead tr:nth-child(2) th:first-child {
    text-align: left;
    padding-left: 18px;
    position: sticky;
    left: 0;
    z-index: 11;
  }

  .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    font-size: 10px;
    opacity: 0.4;
  }

  th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover {
    background: rgba(255,107,0,0.04);
  }

  tbody tr:nth-child(even) {
    background: rgba(14, 14, 14, 0.3);
  }

  tbody tr:nth-child(even):hover {
    background: rgba(255,107,0,0.04);
  }

  td {
    padding: 10px 14px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  td:first-child {
    text-align: left;
    padding-left: 18px;
    font-weight: 600;
    color: #fff;
    font-family: var(--font-body);
    font-size: 13px;
    position: sticky;
    left: 0;
    background: inherit;
    z-index: 5;
  }

  tbody tr:nth-child(odd) td:first-child { background: var(--card); }
  tbody tr:nth-child(even) td:first-child { background: #1a1a1a; }
  tbody tr:hover td:first-child { background: rgba(30, 30, 30, 0.98); }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--subtle);
  }

  .no-results-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .footer {
    text-align: center;
    padding: 24px;
    color: var(--subtle);
    font-size: 12px;
    border-top: 1px solid var(--border);
  }

  .footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 768px) {
    .app-header { padding: 16px; }
    .tab-bar { padding: 8px 16px 0; }
    .main-content { padding: 0 16px 16px; }
    .search-box { width: 100%; }
    .brand h1 { font-size: 20px; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  tbody tr {
    animation: fadeIn 0.15s ease-out both;
  }
</style>
</head>

let sortCol = -1;
let sortDir = 1;

function getTotalSections() {
  return SECTION_NAMES.reduce((s, k) => s + DATA[k].rows.length, 0);
}

function getFilteredRows() {
  const section = DATA[SECTION_NAMES[activeTab]];
  let rows = section.rows;
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    rows = rows.filter(r => r[0].toLowerCase().includes(q) || r.some((c, i) => i > 0 && String(c).includes(q)));
  }
  if (sortCol >= 0) {
    rows = [...rows].sort((a, b) => {
      const va = a[sortCol], vb = b[sortCol];
      if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * sortDir;
      return String(va).localeCompare(String(vb)) * sortDir;
    });
  }
  return rows;
}

function render() {
  const section = DATA[SECTION_NAMES[activeTab]];
  const rows = getFilteredRows();
  const total = getTotalSections();

  document.getElementById('app').innerHTML = `
    <header class="app-header">
      <div class="header-top">
        <div class="brand">
          <a href="hub.html" class="back-btn" title="Back to Portal">←</a>
          <div class="brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M4 6h16M4 6v12h16V6M12 6v12M8 6v12M16 6v12M4 12h16"/></svg>
          </div>
          <div>
            <h1><span>BAMA</span> STEEL DATABASE</h1>
            <p>BS EN 10365 · SCI Blue Book Reference</p>
          </div>
        </div>
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input type="text" id="search" placeholder="Search sections (e.g. 457x191)" value="${searchTerm}">
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat">Total sections: <span class="stat-value">${total}</span></div>
        <div class="stat">Categories: <span class="stat-value">${SECTION_NAMES.length}</span></div>
        <div class="stat">Showing: <span class="stat-value">${rows.length}</span></div>
        <div class="stat">Standard: <span class="stat-value">BS EN 10365</span></div>
      </div>
    </header>
    <nav class="tab-bar">
      ${SECTION_NAMES.map((name, i) => `
        <button class="tab ${i === activeTab ? 'active' : ''}" data-tab="${i}">
          ${name}<span class="tab-count">${DATA[name].rows.length}</span>
        </button>
      `).join('')}
    </nav>
    <main class="main-content">
      <div class="table-info">
        <div class="table-info-left">
          <strong>${SECTION_NAMES[activeTab]}</strong> — ${rows.length} section${rows.length !== 1 ? 's' : ''}
          ${searchTerm ? ` matching "${searchTerm}"` : ''}
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              ${section.headers.map((h, i) => `
                <th class="${sortCol === i ? 'sorted' : ''}" data-col="${i}">
                  ${h}<span class="sort-arrow">${sortCol === i ? (sortDir === 1 ? '▲' : '▼') : '⇅'}</span>
                </th>
              `).join('')}
            </tr>
            <tr>
              ${section.units.map((u, i) => `<th>${u}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rows.length ? rows.map((row, ri) => `
              <tr style="animation-delay:${Math.min(ri * 8, 400)}ms">
                ${row.map((cell, ci) => `<td>${ci === 0 ? cell : formatNum(cell)}</td>`).join('')}
              </tr>
            `).join('') : `
              <tr><td colspan="${section.headers.length}" class="no-results">
                <div class="no-results-icon">🔍</div>
                <div>No sections matching "${searchTerm}"</div>
                <div style="margin-top:8px;font-size:13px">Try a different search term</div>
              </td></tr>
            `}
          </tbody>
        </table>
      </div>
    </main>
    <footer class="footer">
      BAMA Fabrication · UK Steel Sections Database · Data based on BS EN 10365 / BS 4-1 · Reference: SCI Blue Book, Tata Steel
    </footer>
  `;

  // Bind events
  document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value;
    sortCol = -1;
    render();
    document.getElementById('search').focus();
    const input = document.getElementById('search');
    input.setSelectionRange(input.value.length, input.value.length);
  });

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = parseInt(btn.dataset.tab);
      sortCol = -1;
      render();
    });
  });

  document.querySelectorAll('thead tr:first-child th').forEach(th => {
    th.addEventListener('click', () => {
      const col = parseInt(th.dataset.col);
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = 1; }
      render();
    });
  });
}

render();
</script>
</body>
</html>
