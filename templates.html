<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Templates – BAMA ERP</title>
<link rel="stylesheet" href="bama.css">
<style>
  /* ── Templates editor-specific styles ── */
  .tpl-wrap { display: grid; grid-template-columns: 280px 1fr; gap: 0; height: 100vh; overflow: hidden; }
  .tpl-sidebar { background: var(--panel, #1a1a1a); border-right: 1px solid var(--border, #2a2a2a); padding: 24px 0; overflow-y: auto; }
  .tpl-sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--subtle, #888); padding: 0 24px; margin: 0 0 12px; font-weight: 600; }
  .tpl-sidebar h2:not(:first-child) { margin-top: 28px; }
  .tpl-nav-item { padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text, #eee); border-left: 3px solid transparent; transition: all 0.15s; }
  .tpl-nav-item:hover { background: rgba(255,107,0,0.08); }
  .tpl-nav-item.active { background: rgba(255,107,0,0.12); border-left-color: var(--accent, #ff6b00); color: var(--accent, #ff6b00); font-weight: 600; }
  .tpl-nav-icon { font-size: 16px; width: 18px; text-align: center; }

  .tpl-main { display: grid; grid-template-rows: auto 1fr; overflow: hidden; }
  .tpl-header { padding: 20px 32px; border-bottom: 1px solid var(--border, #2a2a2a); display: flex; justify-content: space-between; align-items: center; background: var(--bg, #111); }
  .tpl-header-title { font-size: 20px; font-weight: 700; color: var(--text, #eee); }
  .tpl-header-sub { font-size: 12px; color: var(--subtle, #888); margin-top: 2px; }
  .tpl-header-actions { display: flex; gap: 10px; }

  .tpl-body { display: grid; grid-template-columns: 380px 1fr; gap: 0; overflow: hidden; }
  .tpl-editor { padding: 24px 32px; overflow-y: auto; border-right: 1px solid var(--border, #2a2a2a); background: var(--bg, #111); }
  .tpl-preview-pane { background: #2a2a2a; padding: 24px; overflow: hidden; display: flex; flex-direction: column; }
  .tpl-preview-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--subtle, #888); margin-bottom: 10px; }
  .tpl-preview-frame { flex: 1; width: 100%; border: 0; background: #fff; border-radius: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); min-height: 500px; }

  .tpl-field { margin-bottom: 18px; }
  .tpl-field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--subtle, #888); margin-bottom: 6px; font-weight: 600; }
  .tpl-field input[type="text"], .tpl-field input[type="email"], .tpl-field input[type="tel"], .tpl-field textarea, .tpl-field input[type="color"] {
    width: 100%; padding: 10px 12px; background: var(--panel, #1a1a1a); border: 1px solid var(--border, #2a2a2a); border-radius: 6px; color: var(--text, #eee); font-family: inherit; font-size: 13px; transition: border-color 0.15s;
  }
  .tpl-field input:focus, .tpl-field textarea:focus { outline: none; border-color: var(--accent, #ff6b00); }
  .tpl-field input[type="color"] { height: 42px; padding: 4px; cursor: pointer; }
  .tpl-field textarea { resize: vertical; min-height: 60px; font-family: 'DM Mono', monospace; font-size: 12px; }
  .tpl-field-hint { font-size: 11px; color: var(--subtle, #888); margin-top: 4px; }

  .tpl-logo-preview { display: flex; align-items: center; gap: 14px; padding: 14px; background: #fafafa; border-radius: 6px; margin-bottom: 10px; min-height: 80px; }
  .tpl-logo-preview img { max-height: 60px; max-width: 180px; object-fit: contain; }
  .tpl-logo-preview .tpl-logo-empty { color: #999; font-size: 12px; font-style: italic; }
  .tpl-logo-actions { display: flex; gap: 8px; }

  .tpl-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent, #ff6b00); margin: 0 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border, #2a2a2a); font-weight: 700; }
  .tpl-section-title:not(:first-child) { margin-top: 28px; }

  .tpl-checkbox-field { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
  .tpl-checkbox-field input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent, #ff6b00); cursor: pointer; }
  .tpl-checkbox-field label { text-transform: none; letter-spacing: 0; font-size: 14px; color: var(--text, #eee); font-weight: 400; margin: 0; cursor: pointer; }

  .tpl-unsaved-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent, #ff6b00); margin-right: 8px; opacity: 0; transition: opacity 0.2s; }
  .tpl-unsaved-dot.show { opacity: 1; }

  .tpl-loading { padding: 40px; text-align: center; color: var(--subtle, #888); font-size: 14px; }

  @media (max-width: 1200px) {
    .tpl-body { grid-template-columns: 340px 1fr; }
  }
</style>
</head>
<body>

<!-- Auth gate (shown while checking manager session) -->
<div id="tplAuthGate" class="tpl-loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
  Checking access…
</div>

<!-- Main UI (shown after auth passes) -->
<div id="tplApp" class="tpl-wrap" style="display:none">

  <!-- Sidebar -->
  <aside class="tpl-sidebar">
    <h2>Company</h2>
    <div class="tpl-nav-item active" data-target="global">
      <span class="tpl-nav-icon">&#127970;</span>
      <span>Global Details</span>
    </div>

    <h2>Templates</h2>
    <div class="tpl-nav-item" data-target="payroll">
      <span class="tpl-nav-icon">&#128176;</span>
      <span>Payroll Summary</span>
    </div>
    <div class="tpl-nav-item" data-target="attendance">
      <span class="tpl-nav-icon">&#128202;</span>
      <span>Attendance Report</span>
    </div>
    <div class="tpl-nav-item" data-target="deliveryNote">
      <span class="tpl-nav-icon">&#128230;</span>
      <span>Delivery Note</span>
    </div>
  </aside>

  <!-- Main -->
  <main class="tpl-main">
    <header class="tpl-header">
      <div>
        <div class="tpl-header-title">
          <span id="tplUnsavedDot" class="tpl-unsaved-dot"></span>
          <span id="tplHeaderTitle">Global Details</span>
        </div>
        <div class="tpl-header-sub" id="tplHeaderSub">Company info shared by all templates</div>
      </div>
      <div class="tpl-header-actions">
        <button class="btn btn-ghost" onclick="window.location.href='manager.html'">&#8592; Back to Manager</button>
        <button id="tplSaveBtn" class="btn btn-primary" onclick="tplSaveAll()" disabled>Save Changes</button>
      </div>
    </header>

    <div class="tpl-body">
      <!-- Editor pane -->
      <section class="tpl-editor" id="tplEditorPane">
        <div class="tpl-loading">Loading…</div>
      </section>

      <!-- Preview pane -->
      <section class="tpl-preview-pane">
        <div class="tpl-preview-label">Live Preview</div>
        <iframe id="tplPreviewFrame" class="tpl-preview-frame" sandbox="allow-same-origin"></iframe>
      </section>
    </div>
  </main>

</div>

<!-- Hidden file input for logo upload -->
<input type="file" id="tplLogoInput" accept=".png,image/png" style="display:none" onchange="tplHandleLogoFile(event)">

<!-- Toast container (reuses bama.css styling) -->
<div id="toastContainer"></div>

<script src="shared.js"></script>
</body>
</html>
